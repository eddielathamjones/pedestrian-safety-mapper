<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pedestrian Safety Mapper</title>

  <link rel="stylesheet" href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" />
  <link rel="stylesheet" href="css/app.css" />
</head>
<body>

  <div id="map"></div>

  <div id="controls">
    <div id="controls-header">
      <h1>Pedestrian Fatalities</h1>
      <p class="subtitle">FARS · 2001–2022</p>
    </div>

    <div class="control-group">
      <label>Years</label>
      <div style="display:flex;gap:6px;align-items:center;">
        <select id="year-from"></select>
        <span style="color:var(--text-muted);font-size:11px;flex-shrink:0;">–</span>
        <select id="year-to"></select>
      </div>
    </div>

    <div id="stats">
      <div id="count"></div>
      <div id="incident-total"></div>
    </div>

    <div id="anim-progress-bar">
      <div id="anim-progress-fill"></div>
      <div id="anim-progress-window"></div>
    </div>

    <div class="divider"></div>

    <div id="anim-controls">

      <div class="control-group">
        <label>View</label>
        <div class="view-toggle">
          <button class="view-btn active" id="view-animate">Animate</button>
          <button class="view-btn" id="view-filter">Filter</button>
        </div>
      </div>

      <!-- Animate-specific controls -->
      <div id="animate-sub">
        <div class="control-group">
          <label>Mode</label>
          <div class="view-toggle">
            <button class="view-btn" id="anim-mode-day">Day</button>
            <button class="view-btn active" id="anim-mode-week">Week</button>
          </div>
        </div>
        <div class="control-group">
          <label>Playback</label>
          <div style="display:flex;gap:6px;">
            <button id="anim-playpause" style="flex:1">⏸ Pause</button>
            <button id="anim-rewind">⏮</button>
          </div>
        </div>
        <div class="control-group">
          <label>Trail — <span id="trail-value">3h</span></label>
          <input type="range" id="trail-slider" min="1" max="12" step="0.5" value="3" />
        </div>
      </div>

      <!-- Filter-specific controls -->
      <div id="filter-sub" class="hidden">
        <div class="control-group">
          <label>Days</label>
          <div class="filter-chips" id="dow-chips">
            <button class="chip active" data-dow="0">Mon</button>
            <button class="chip active" data-dow="1">Tue</button>
            <button class="chip active" data-dow="2">Wed</button>
            <button class="chip active" data-dow="3">Thu</button>
            <button class="chip active" data-dow="4">Fri</button>
            <button class="chip active" data-dow="5">Sat</button>
            <button class="chip active" data-dow="6">Sun</button>
          </div>
        </div>
        <div class="control-group">
          <label>From — <span id="filter-from-value">5:00 PM</span></label>
          <input type="range" id="filter-from" min="0" max="23" step="1" value="17" />
        </div>
        <div class="control-group">
          <label>To — <span id="filter-to-value">9:00 PM</span></label>
          <input type="range" id="filter-to" min="0" max="23" step="1" value="21" />
        </div>
      </div>

    </div>

    <div class="divider"></div>

    <div class="control-group">
      <label>Road Heat</label>
      <div class="view-toggle">
        <button class="view-btn active" id="heat-on">On</button>
        <button class="view-btn" id="heat-off">Off</button>
      </div>
    </div>

    <div class="control-group">
      <label>Dot Style</label>
      <div class="view-toggle">
        <button class="view-btn active" data-sprite="explosion">Blast</button>
        <button class="view-btn" data-sprite="ember">Ember</button>
        <button class="view-btn" data-sprite="spark">Spark</button>
      </div>
    </div>

    <div class="divider"></div>
    <p id="solar-ref" class="subtitle solar-condition"></p>
  </div>

  <div id="loading-bar" class="hidden"></div>

  <script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
  <script src="https://unpkg.com/suncalc@1.9.0/suncalc.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
