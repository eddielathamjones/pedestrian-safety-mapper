<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pedestrian Safety Mapper</title>

  <link rel="stylesheet" href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" />
  <link rel="stylesheet" href="css/app.css" />
</head>
<body>

  <div id="map"></div>

  <div id="controls">
    <div id="controls-header">
      <h1>Pedestrian Fatalities</h1>
      <p class="subtitle"><a class="subtitle-link" href="https://www.nhtsa.gov/research-data/fatality-analysis-reporting-system-fars" target="_blank" rel="noopener">FARS · 2001–2023</a></p>
      <a id="data-update-badge" class="data-update-badge hidden"
         href="https://www.nhtsa.gov/research-data/fatality-analysis-reporting-system-fars"
         target="_blank" rel="noopener"></a>
    </div>

    <div class="control-group">
      <label>Years</label>
      <div style="display:flex;gap:6px;align-items:center;">
        <select id="year-from"></select>
        <span style="color:var(--text-muted);font-size:11px;flex-shrink:0;">–</span>
        <select id="year-to"></select>
      </div>
    </div>

    <div id="stats">
      <div id="count"></div>
      <div id="incident-total"></div>
    </div>

    <div id="anim-progress-bar">
      <div id="anim-progress-fill"></div>
      <div id="anim-progress-window"></div>
    </div>

    <div class="divider"></div>

    <div id="anim-controls">

      <div class="control-group">
        <label>View</label>
        <div class="view-toggle">
          <button class="view-btn active" id="view-animate">Animate</button>
          <button class="view-btn" id="view-filter">Filter</button>
        </div>
      </div>

      <!-- Animate-specific controls -->
      <div id="animate-sub">
        <div class="control-group">
          <label>Mode</label>
          <div class="view-toggle">
            <button class="view-btn" id="anim-mode-day">24h</button>
            <button class="view-btn active" id="anim-mode-week">Week</button>
          </div>
        </div>
        <div id="anim-dow-wrap" class="control-group">
          <label>Days</label>
          <div class="filter-chips">
            <button class="chip active" data-anim-dow="0">Mon</button>
            <button class="chip active" data-anim-dow="1">Tue</button>
            <button class="chip active" data-anim-dow="2">Wed</button>
            <button class="chip active" data-anim-dow="3">Thu</button>
            <button class="chip active" data-anim-dow="4">Fri</button>
            <button class="chip active" data-anim-dow="5">Sat</button>
            <button class="chip active" data-anim-dow="6">Sun</button>
          </div>
        </div>
        <div class="control-group">
          <label>Playback</label>
          <div style="display:flex;gap:6px;">
            <button id="anim-playpause" style="flex:1" data-tooltip="Play / pause">⏸ Pause</button>
            <button id="anim-rewind" data-tooltip="Reset to start">↺</button>
          </div>
        </div>
        <div class="control-group">
          <label>Speed</label>
          <div class="view-toggle">
            <button class="view-btn" data-speed="0.4">Slow</button>
            <button class="view-btn active" data-speed="1">Normal</button>
            <button class="view-btn" data-speed="2.5">Fast</button>
          </div>
        </div>
      </div>

      <!-- Filter-specific controls -->
      <div id="filter-sub" class="hidden">
        <div class="control-group">
          <label>Days</label>
          <div class="filter-chips" id="dow-chips">
            <button class="chip active" data-dow="0">Mon</button>
            <button class="chip active" data-dow="1">Tue</button>
            <button class="chip active" data-dow="2">Wed</button>
            <button class="chip active" data-dow="3">Thu</button>
            <button class="chip active" data-dow="4">Fri</button>
            <button class="chip active" data-dow="5">Sat</button>
            <button class="chip active" data-dow="6">Sun</button>
          </div>
        </div>
        <div class="control-group">
          <label>From — <span id="filter-from-value">5:00 PM</span></label>
          <input type="range" id="filter-from" min="12" max="35" step="1" value="17" />
        </div>
        <div class="control-group">
          <label>To — <span id="filter-to-value">11:00 PM</span></label>
          <input type="range" id="filter-to" min="12" max="35" step="1" value="23" />
        </div>
        <div class="control-group">
          <label>Presets</label>
          <div class="filter-chips">
            <button class="chip" data-preset="day">Day</button>
            <button class="chip" data-preset="sunset">Sunset</button>
            <button class="chip" data-preset="night">Night</button>
            <button class="chip" data-preset="sunrise">Sunrise</button>
            <button class="chip" data-preset="all">All</button>
          </div>
        </div>
      </div>

    </div>

    <div class="divider"></div>

    <div class="control-group">
      <label>Road Heat</label>
      <div class="view-toggle">
        <button class="view-btn active" id="heat-on">On</button>
        <button class="view-btn" id="heat-off">Off</button>
      </div>
    </div>

    <div class="divider"></div>
    <p id="solar-ref" class="subtitle solar-condition"></p>
  </div>

  <div id="loading-bar" class="hidden"></div>

  <div id="sun-hud" class="hidden" data-tooltip="Sun position · dot shows bearing and altitude above horizon">
    <canvas id="sun-hud-canvas" width="80" height="90"></canvas>
  </div>

  <script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
  <script src="https://unpkg.com/suncalc@1.9.0/suncalc.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
